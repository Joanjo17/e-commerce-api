spring:
  application:
    name: e-commerce
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: UTC
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 10s
  cache:
    type: redis
    redis:
      time-to-live: 600s
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
  main:
    lazy-initialization: false

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  cors:
    origins: ${APP_CORS_ORIGINS:http://localhost:*}
  security:
    jwt:
      generator: ${USER_GENERATOR}
      secret-key: ${SECRET_KEY}
      ttl-seconds: ${JWT_TTL}
      refresh-ttl-seconds: ${JWT_REFRESH_TTL}
  cookies:
    secure: ${COOKIES_SECURE:true}
    same-site: ${COOKIES_SAME_SITE:None}

server:
  port: ${PORT:8080}
